name: Keep Alive

on:
  schedule:
    # Every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -fsS --retry 3 --retry-delay 5 \
            "https://pricing-api-production-667e.up.railway.app/health" \
            || echo "API ping failed"
      
      - name: Ping UI
        run: |
          curl -fsS --retry 3 --retry-delay 5 \
            "https://pricingoptimisationproject-production.up.railway.app/" \
            || echo "UI ping failed"
      
      - name: Log status
        run: echo "Keep-alive pings completed at $(date)"
